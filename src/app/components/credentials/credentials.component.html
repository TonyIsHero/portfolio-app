<section class="credentials">
  <div class="container">
    <div class="credentials__header reveal">
      <span class="section-label">Certifications &amp; Validations</span>
      <h2 class="credentials__title">Engineering Credentials</h2>
    </div>

    <div class="credentials__grid">
      <article
        *ngFor="let cred of credentials; let i = index"
        class="cred-card reveal"
        [class]="'reveal-delay-' + (i + 1)"
        [attr.aria-label]="cred.title + ' certification'"
      >
        <div class="cred-card__icon" [style.color]="cred.color" [innerHTML]="cred.icon"></div>

        <div class="cred-card__body">
          <p class="cred-card__issuer">{{ cred.issuer }}</p>
          <h3 class="cred-card__title">{{ cred.title }}</h3>
        </div>

        <div class="cred-card__badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span>{{ cred.year }}</span>
        </div>
      </article>
    </div>
  </div>
</section>
